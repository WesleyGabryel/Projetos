<!doctype html>
<html lang="pt-br" class="light">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLinks</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img
          src="https://github.com/wesleygabryel.png"
          alt="Foto de perfil de Wesley Gabryel"
        />
        <p>Wesley Gabryel</p>
      </div>

      <div id="switch" onclick="toggleMode()">
        <button type="button" aria-label="Alternar modo"></button>
        <span></span>
      </div>

      <ul>
        <li>
          <a
            href="https://github.com/wesleygabryel"
            target="_blank"
            rel="noopener noreferrer"
            >Ver meu Portifólio</a
          >
        </li>
        <li>
          <a href="/assets/wesley_gabryel_dias_ramos.pdf" target="_blank"
            >Meu Currículo</a
          >
        </li>
        <li>
          <a
            href="https://www.linkedin.com/in/wesley-gabryel-dias-99330741b/"
            target="_blank"
            rel="noopener noreferrer"
            >Linkedin</a
          >
        </li>
        <li>
          <a
            href="https://www.facebook.com/wesleygabriel.dias/about/?fb_profile_edit_entry_point=%7B%22click_point%22%3A%22edit_profile_button%22%2C%22feature%22%3A%22profile_header%22%7D&id=100067783511939&sk=about"
            target="_blank"
            rel="noopener noreferrer"
            >Facebook</a
          >
        </li>
      </ul>
      <div id="social-links">
        <a
          href="https://github.com/wesleygabryel"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub"
        >
          <ion-icon name="logo-github"></ion-icon>
        </a>
        <a
          href="https://www.linkedin.com/in/wesley-gabryel-dias-99330741b/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
        >
          <ion-icon name="logo-linkedin"></ion-icon>
        </a>
        <a
          href="https://api.whatsapp.com/send/?phone=69993802906&text&type=phone_number&app_absent=0"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="WhatsApp"
        >
          <ion-icon name="logo-whatsapp"></ion-icon>
        </a>
        <a
          href="https://www.tiktok.com/@wesley_gabryel3"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="TikTok"
        >
          <ion-icon name="logo-tiktok"></ion-icon>
        </a>
      </div>

      <footer>
        "Ora, a fé é a certeza daquilo que esperamos e a prova das coisas que
        não vemos." - Hebreus 11:1 ✞
      </footer>
    </div>

    <script src="./script.js"></script>

    <script
      type="module"
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
